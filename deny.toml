# cargo-deny configuration
# Protects AGPL-3.0-or-later licensing

[advisories]
version = 2
ignore = []

[licenses]
version = 2
confidence-threshold = 0.8

# Only permissive licenses for dependencies
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "CC0-1.0",
    "Unlicense",
    "MPL-2.0",
    "Unicode-3.0",
    "Unicode-DFS-2016",
]

# Denied by omission: GPL, LGPL, SSPL, proprietary, unknown
# AGPL-3.0-or-later is allowed for Themis's own crate via exceptions.

exceptions = [
    { name = "themis-cli", allow = ["AGPL-3.0-or-later"] },
]

[licenses.private]
ignore = false

[bans]
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"

[sources]
unknown-registry = "deny"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
