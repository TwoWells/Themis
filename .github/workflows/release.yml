# Release — on a vX.Y.Z tag push:
#   1. verify        the tag matches Cargo.toml's version
#   2. build         the release binaries on GitHub-hosted runners
#                    (Linux x86_64 in a container + macOS arm64 on macos-14),
#                    each attested with build provenance at release time
#   3. publish-crate publish `themis-cli` to crates.io via Trusted Publishing
#                    (OIDC — no stored token); the installed binary stays `themis`
#   4. release       cut a GitHub Release with the binary + SHA256 checksum
#
# Triggered ONLY by tag pushes (which require write access), so a fork PR can
# never trigger it — the publish credential is never exposed to untrusted code.
#
# One-time setup before the first tag:
#   - crates.io: claim `themis-cli`, then crate Settings → Trusted Publishing →
#     add publisher (repo TwoWells/Themis, workflow release.yml, environment
#     `release`).
#   - GitHub: Settings → Environments → create `release`.
#
# Release contract — the downstream packaging (pkgbuilds, homebrew-tap) parses
# releases by these conventions; breaking any SILENTLY breaks the AUR/Homebrew
# bump on the next release (see ThemisInternal decision 002):
#   1. Tag named vX.Y.Z (the verify job enforces tag == Cargo.toml version).
#   2. Assets `themis-<rust-triple>.tar.gz` + a `.tar.gz.sha256` sidecar each,
#      binary at the archive root. The sidecars are REQUIRED — Homebrew reads
#      checksums from them. Keep this naming if you add a target.
#   3. Cargo.lock committed in the tagged tree (the AUR source build is --locked).
#   4. LICENSE present in the tagged tree (themis-bin fetches it from the tag).
#   5. The `themis completions {bash,zsh,fish}` subcommand (every package builds
#      completions by running the binary; guarded by tests/integration_test.rs).
# `make release` / `make tag-current` run `make release-contract`, which checks the
# locally-verifiable parts (Cargo.lock tracked, LICENSE present) before tagging.
name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write # create the GitHub Release
  id-token: write # OIDC token for crates.io Trusted Publishing + attestation
  attestations: write # mint build-provenance attestations for the release assets

jobs:
  # Guard: a pushed tag whose version disagrees with Cargo.toml is a mistake.
  verify:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
    steps:
      - uses: actions/checkout@v7
      - id: v
        name: Tag must match Cargo.toml version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          manifest="$(grep '^version = ' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')"
          echo "tag=$tag  manifest=$manifest"
          if [ "$tag" != "$manifest" ]; then
            echo "::error::tag v$tag does not match Cargo.toml version $manifest"
            exit 1
          fi
          echo "version=$tag" >> "$GITHUB_OUTPUT"

  # Native release build per platform. fail-fast: false so one platform's
  # failure does not cancel the others. Linux x86_64 in a container on a hosted
  # runner + aarch64-apple-darwin natively on a hosted Apple Silicon runner.
  build:
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            container: ghcr.io/twowells/rust-ci:latest
          # Native build on a GitHub-hosted Apple Silicon runner. container "" →
          # the job runs on the host, not in a container (macOS can't use Linux
          # images). rustup + cargo are already on PATH; `rustup target add`
          # below ensures the apple target is installed.
          - target: aarch64-apple-darwin
            runner: macos-14
            container: ""
    runs-on: ${{ matrix.runner }}
    container: ${{ matrix.container }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v7
      # rustup reads rust-toolchain.toml; `rustup target add` ensures the matrix
      # target is installed. Works as-is on both the Linux container (cargo on
      # PATH) and the hosted macOS runner (rustup + cargo preinstalled on PATH).
      - name: Materialize Rust toolchain
        run: |
          rustup show
          rustup target add ${{ matrix.target }}
      - name: Build release binary
        run: cargo build --locked --release --target ${{ matrix.target }}
      - name: Package tar.gz + checksum
        run: |
          mkdir -p dist
          tar -C "target/${{ matrix.target }}/release" -czf \
            "dist/themis-${{ matrix.target }}.tar.gz" themis
          cd dist
          # macOS has no `sha256sum`; fall back to `shasum -a 256`. Both emit the
          # same "<hash>  <file>" format the installer/AUR/Homebrew consume.
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "themis-${{ matrix.target }}.tar.gz" \
              > "themis-${{ matrix.target }}.tar.gz.sha256"
          else
            shasum -a 256 "themis-${{ matrix.target }}.tar.gz" \
              > "themis-${{ matrix.target }}.tar.gz.sha256"
          fi
      - uses: actions/upload-artifact@v7
        with:
          name: themis-${{ matrix.target }}
          path: dist/*

  # Publish to crates.io. Idempotent: skips if this version is already live, so a
  # re-run (or a re-pushed tag) is a harmless no-op rather than a hard failure.
  publish-crate:
    needs: verify
    runs-on: ubuntu-latest
    container: ghcr.io/twowells/rust-ci:latest
    defaults:
      run:
        shell: bash
    # Must match the Environment registered in crates.io Trusted Publishing.
    environment: release
    steps:
      - uses: actions/checkout@v7
      - name: Materialize Rust toolchain
        run: rustup show
      - name: Skip if version already on crates.io
        id: guard
        run: |
          v="${{ needs.verify.outputs.version }}"
          # Query the sparse index, not /api/v1 (the API 403s requests with no
          # descriptive User-Agent; the index has no such policy). Path for a
          # name >= 4 chars: <chars 1-2>/<chars 3-4>/<name>. `|| true` tolerates
          # the 404 a never-yet-published crate returns.
          idx="$(curl -fsS https://index.crates.io/th/em/themis-cli || true)"
          if printf '%s\n' "$idx" | grep -q "\"vers\":\"$v\""; then
            echo "themis-cli $v is already published — skipping."
            echo "already=1" >> "$GITHUB_OUTPUT"
          fi
      - name: Authenticate to crates.io (Trusted Publishing)
        if: steps.guard.outputs.already != '1'
        id: auth
        uses: rust-lang/crates-io-auth-action@v1
      - name: cargo publish
        if: steps.guard.outputs.already != '1'
        run: cargo publish --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

  release:
    needs: [verify, build, publish-crate]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true
      # Mint a build-provenance attestation for the platform tarballs (the glob
      # deliberately skips the .tar.gz.sha256 sidecars — no value attesting
      # checksum files). Consumers can verify with `gh attestation verify`.
      - uses: actions/attest-build-provenance@v4
        with:
          subject-path: dist/themis-*.tar.gz
      - uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: v${{ needs.verify.outputs.version }}
          generate_release_notes: true
          files: dist/*
